<script>
const statusClasses = {
      update_available: 'status-update-available',
      up_to_date: 'status-up-to-date',
      unknown: 'status-unknown'
    };
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return String(unsafe)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
    const updatesHint = document.getElementById('updates-performance-hint');
    const manualScanBtn = document.getElementById('updates-scan-btn');
    const pollingDefaults = { intervalMs: 20000 };
    const pollingPerformance = { intervalMs: 45000 };
    let refreshIntervalMs = pollingDefaults.intervalMs;
    let refreshTimer = null;
    let autoScanEnabled = !(window.d2haSettings?.performanceMode);
    const safeParseEvent = (evt) => {
      try { return JSON.parse(evt.data); }
      catch (e) { return {}; }
    };

    const stackToggles = Array.from(document.querySelectorAll('[data-stack-toggle]'));
    stackToggles.forEach((header) => {
      const btn = header.querySelector('.section-toggle-btn, .stack-toggle-btn');
      const content = header.nextElementSibling;
      const card = header.closest('.section-card');
      const chevron = btn ? btn.querySelector('.chevron') : null;
      if (!btn || !content) return;

      const setExpanded = (expanded) => {
        content.classList.toggle('collapsed', !expanded);
        if (card) card.classList.toggle('collapsed', !expanded);
        btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        if (chevron) chevron.textContent = expanded ? '▾' : '▸';
      };

      setExpanded(true);

      const toggle = () => {
        const isExpanded = btn.getAttribute('aria-expanded') === 'true';
        setExpanded(!isExpanded);
      };

      btn.addEventListener('click', (event) => {
        event.stopPropagation();
        toggle();
      });

      header.addEventListener('click', (event) => {
        if (event.target === btn || btn.contains(event.target)) return;
        toggle();
      });
    });

    const trackButtons = Array.from(document.querySelectorAll('[data-save-track]'));

    function updateRowContainerId(row, oldId, newId) {
      if (oldId === newId || !newId) return;
      row.dataset.containerId = newId;

      const form = row.querySelector('form.full-update-form');
      if (form) form.dataset.containerId = newId;

      const trackInput = row.querySelector(`[data-update-track="${oldId}"]`);
      if (trackInput) {
        trackInput.id = `track-${newId}`;
        trackInput.dataset.updateTrack = newId;
      }
      
      const label = row.querySelector(`label[for="track-${oldId}"]`);
      if (label) label.setAttribute('for', `track-${newId}`);

      const btn = row.querySelector(`[data-save-track][data-container-id="${oldId}"]`);
      if (btn) btn.dataset.containerId = newId;

      const feedback = row.querySelector(`[data-track-feedback="${oldId}"]`);
      if (feedback) feedback.dataset.trackFeedback = newId;
    }

    function applyStatus(row, state) {
      const pill = row.querySelector('[data-status-pill]');
      if (!pill) return;
      pill.classList.remove('status-update-available', 'status-up-to-date', 'status-unknown');
      pill.classList.add(statusClasses[state] || 'status-unknown');

      let label = 'Sconosciuto';
      if (state === 'update_available') label = 'Update disponibile';
      else if (state === 'up_to_date') label = 'Aggiornato';
      pill.textContent = label;
    }

    async function refreshRow(row) {
      const id = row.dataset.containerId;
      try {
        const res = await fetch(`/api/containers/${id}/updates`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
        if (!res.ok) throw new Error('fail');
        const data = await res.json();
        applyStatus(row, data.update_state);

        const installedEl = row.querySelector('[data-installed-tag]');
        const installedIdEl = row.querySelector('[data-installed-id]');
        const remoteEl = row.querySelector('[data-remote-tag]');
        const remoteIdEl = row.querySelector('[data-remote-id]');

        if (installedEl) {
          const installedDisplay =
            data.installed_display_version ||
            data.installed_version ||
            data.installed_tag ||
            data.installed_id_short;
          installedEl.textContent = installedDisplay || 'n/d';
        }
        if (installedIdEl) installedIdEl.textContent = data.installed_id_short || '';

        if (remoteEl) {
          const remoteDisplay =
            data.remote_display_version ||
            data.remote_version ||
            data.remote_tag ||
            data.remote_id_short;
          remoteEl.textContent = remoteDisplay || 'n/d';
          remoteEl.classList.toggle('badge-null', !remoteDisplay);
        }

        if (remoteIdEl) {
          if (data.remote_id_short) {
            remoteIdEl.textContent = data.remote_id_short;
            remoteIdEl.style.display = 'inline';
          } else {
            remoteIdEl.textContent = '';
            remoteIdEl.style.display = 'none';
          }
        }

        const feedback = row.querySelector('[data-track-feedback]');
        if (feedback) {
          if (data.check_tag) {
            feedback.textContent = `Controllo su "${data.check_tag}"`;
          } else {
            feedback.textContent = 'Usa il tag configurato nel container';
          }
        }
      } catch (e) {
        // silently ignore
      }
    }

    function scheduleRefresh() {
      const rows = Array.from(document.querySelectorAll('.container-row'));
      rows.forEach(row => refreshRow(row));
    }

    function startUpdatesPolling() {
      clearInterval(refreshTimer);
      if (!autoScanEnabled) return;
      scheduleRefresh();
      refreshTimer = setInterval(scheduleRefresh, refreshIntervalMs);
    }

    manualScanBtn?.addEventListener('click', () => {
      scheduleRefresh();
    });

    window.registerPerformanceHandler?.((enabled) => {
      refreshIntervalMs = enabled ? pollingPerformance.intervalMs : pollingDefaults.intervalMs;
      autoScanEnabled = !enabled;
      updatesHint?.classList.toggle('visible', enabled);
      startUpdatesPolling();
    });

    startUpdatesPolling();

    const modal = document.getElementById('confirm-modal');
    const messageEl = document.getElementById('confirm-message');
    const cancelBtn = document.getElementById('cancel-confirm');
    const confirmBtn = document.getElementById('confirm-continue');
    const confirmTitle = document.getElementById('confirm-title');
    const confirmLoading = document.getElementById('confirm-loading');
    const confirmResult = document.getElementById('confirm-result');
    const confirmActions = document.getElementById('confirm-actions');
    const confirmPhase = document.getElementById('confirm-phase');
    const confirmProgress = document.getElementById('confirm-progress');
    const confirmProgressFill = document.getElementById('confirm-progress-fill');
    const confirmProgressText = document.getElementById('confirm-progress-text');
    const confirmLogline = document.getElementById('confirm-logline');
    let pendingForm = null;
    let updateInProgress = false;
    let activeUpdateStream = null;

    const updatePhaseLabels = {
      start: 'Avvio…',
      inspect: 'Lettura del container…',
      stopping: 'Arresto e rimozione del container…',
      cleanup: 'Rimozione vecchia immagine…',
      pull: 'Scaricamento immagine…',
      pulled: 'Immagine pronta',
      recreate: 'Creazione e avvio del nuovo container…',
      done: 'Completato',
    };

    function setUpdatePhase(text) {
      if (confirmPhase && text) confirmPhase.textContent = text;
    }
    function setUpdateProgress(percent, label) {
      if (!confirmProgress) return;
      confirmProgress.style.display = 'block';
      if (percent === null || percent === undefined) {
        confirmProgressFill.classList.add('indeterminate');
        confirmProgressText.textContent = label || '';
      } else {
        confirmProgressFill.classList.remove('indeterminate');
        confirmProgressFill.style.width = `${Math.max(0, Math.min(100, percent))}%`;
        confirmProgressText.textContent = label || `${percent}%`;
      }
    }
    function setUpdateLog(text) {
      if (confirmLogline && text) confirmLogline.textContent = text;
    }

    function resetModalState() {
      messageEl.style.display = 'block';
      confirmLoading.style.display = 'none';
      confirmResult.style.display = 'none';
      confirmActions.style.display = 'flex';
      confirmResult.className = 'confirm-result small';
      confirmTitle.textContent = "Aggiornare l'immagine?";
    }

    function showModalLoading() {
      messageEl.style.display = 'none';
      confirmLoading.style.display = 'block';
      confirmResult.style.display = 'none';
      confirmActions.style.display = 'none';
      confirmTitle.textContent = 'Aggiornamento in corso';
      // Reset progress UI
      if (confirmPhase) confirmPhase.textContent = 'Preparazione…';
      if (confirmProgress) confirmProgress.style.display = 'none';
      if (confirmProgressFill) { confirmProgressFill.style.width = '0%'; confirmProgressFill.classList.remove('indeterminate'); }
      if (confirmProgressText) confirmProgressText.textContent = '';
      if (confirmLogline) confirmLogline.textContent = '';
    }

    function showModalResult(success, message) {
      confirmLoading.style.display = 'none';
      confirmResult.style.display = 'block';
      confirmResult.className = `confirm-result small ${success ? 'success' : 'error'}`;
      confirmResult.textContent = message;
      confirmActions.style.display = 'flex';
      cancelBtn.textContent = 'Chiudi';
      confirmBtn.style.display = 'none';
      confirmTitle.textContent = success ? 'Aggiornamento completato' : 'Errore';
    }

    function openConfirm(form) {
      pendingForm = form;
      resetModalState();
      cancelBtn.textContent = 'Annulla';
      confirmBtn.style.display = 'inline-flex';
      const name = form.dataset.containerName || 'questo container';
      messageEl.textContent = `Vuoi aggiornare l'immagine di "${name}"?`;
      modal.classList.add('visible');
    }

    function closeConfirm() {
      // Don't let the user dismiss the modal while an update is mid-flight.
      if (updateInProgress) return;
      pendingForm = null;
      modal.classList.remove('visible');
    }

    function startFullUpdateStream(containerId) {
      if (typeof EventSource === 'undefined') {
        return Promise.reject(Object.assign(new Error('EventSource non supportato'), { unsupported: true }));
      }
      return new Promise((resolve, reject) => {
        const source = new EventSource(`/api/containers/${containerId}/full_update/stream`);
        activeUpdateStream = source;
        let settled = false;
        let resultData = null;
        let sameImage = false;

        const finish = (fn, arg) => {
          if (settled) return;
          settled = true;
          source.close();
          activeUpdateStream = null;
          fn(arg);
        };

        source.addEventListener('progress', (evt) => {
          const d = safeParseEvent(evt);
          if (typeof d.same_image === 'boolean') sameImage = d.same_image;
          if (d.phase && updatePhaseLabels[d.phase]) setUpdatePhase(updatePhaseLabels[d.phase]);
          if (d.phase === 'pull' && typeof d.percent === 'number') {
            const lbl = d.total
              ? `${formatBytes(d.current)} / ${formatBytes(d.total)} · ${d.percent}%`
              : `${d.percent}%`;
            setUpdateProgress(d.percent, lbl);
          } else if (d.phase === 'pulled') {
            setUpdateProgress(100, '100%');
          } else {
            setUpdateProgress(null, '');
          }
          if (d.message) setUpdateLog(d.message);
        });

        source.addEventListener('result', (evt) => { resultData = safeParseEvent(evt); });
        source.addEventListener('fail', (evt) => {
          const d = safeParseEvent(evt);
          finish(reject, new Error(d.message || 'Aggiornamento fallito'));
        });
        source.addEventListener('end', () => {
          finish(resolve, Object.assign({}, resultData, { same_image: sameImage }));
        });
        source.onerror = () => { finish(reject, Object.assign(new Error('Connessione interrotta'), { transport: true })); };
      });
    }

    document.querySelectorAll('.full-update-form').forEach(form => {
      form.addEventListener('submit', (evt) => {
        evt.preventDefault();
        openConfirm(form);
      });
    });

    trackButtons.forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.containerId;
        const input = document.querySelector(`[data-update-track="${id}"]`);
        const feedback = document.querySelector(`[data-track-feedback="${id}"]`);
        if (!id || !input) return;

        const tag = input.value.trim();
        if (feedback) feedback.textContent = 'Salvataggio...';

        try {
          const res = await fetch(`/api/containers/${id}/updates/track`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tag }),
          });

          if (!res.ok) throw new Error('failed');
          await refreshRow(btn.closest('.container-row'));
        } catch (err) {
          if (feedback) feedback.textContent = 'Errore nel salvataggio';
        }
      });
    });

    cancelBtn.addEventListener('click', closeConfirm);
    modal.addEventListener('click', (evt) => {
      if (evt.target === modal) closeConfirm();
    });

    function finalizeUpdatedRow(containerId, newContainerId) {
      const row = document.querySelector(`[data-container-id="${containerId}"]`);
      if (!row) return;
      if (newContainerId && newContainerId !== containerId) {
        updateRowContainerId(row, containerId, newContainerId);
      }
      refreshRow(row);
    }

    async function updateViaPost(containerId, containerName) {
      try {
        const res = await fetch(`/api/containers/${containerId}/full_update`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
        const data = await res.json();
        if (data.success) {
          finalizeUpdatedRow(containerId, data.container_id);
          showModalResult(true, `Container "${containerName}" aggiornato con successo!`);
        } else {
          showModalResult(false, data.error || 'Errore durante l\'aggiornamento');
        }
      } catch (err) {
        showModalResult(false, 'Errore di connessione al server');
      }
    }

    confirmBtn.addEventListener('click', async () => {
      if (!pendingForm) return;

      const containerId = pendingForm.dataset.containerId;
      const containerName = pendingForm.dataset.containerName || 'container';
      if (!containerId) { showModalResult(false, 'ID container non valido'); return; }

      showModalLoading();
      updateInProgress = true;

      // Primary path: streamed update with live progress (works without debug mode).
      try {
        const result = await startFullUpdateStream(containerId);
        updateInProgress = false;
        finalizeUpdatedRow(containerId, result && result.container_id);
        showModalResult(true, (result && result.same_image)
          ? `"${containerName}" era già all'ultima versione.`
          : `Container "${containerName}" aggiornato con successo!`);
        return;
      } catch (err) {
        updateInProgress = false;
        if (err && err.unsupported) {
          // Browser without EventSource: fall back to the blocking POST.
          await updateViaPost(containerId, containerName);
          return;
        }
        if (err && err.transport) {
          // Connection dropped, but the update runs decoupled on the server.
          showModalResult(false, 'Connessione persa durante lo streaming. L\'aggiornamento prosegue in background: aggiorna la pagina tra qualche istante.');
          setTimeout(() => finalizeUpdatedRow(containerId, null), 5000);
          return;
        }
        showModalResult(false, (err && err.message) || 'Errore durante l\'aggiornamento');
      }
    });

    // ========== BATCH UPDATE LOGIC ==========
    const batchModal = document.getElementById('batch-modal');
    const batchBtn = document.getElementById('batch-update-btn');
    const batchList = document.getElementById('batch-list');
    const batchSelectAllCb = document.getElementById('batch-select-all-cb');
    const batchStart = document.getElementById('batch-start');
    const batchCancel = document.getElementById('batch-cancel');
    const batchCloseSelect = document.getElementById('batch-close-select');
    const batchDone = document.getElementById('batch-done');
    const phaseSelect = document.getElementById('batch-phase-select');
    const phaseProgress = document.getElementById('batch-phase-progress');
    const phaseSummary = document.getElementById('batch-phase-summary');

    function getUpdatableContainers() {
      const rows = Array.from(document.querySelectorAll('.container-row'));
      return rows.filter(row => {
        const pill = row.querySelector('[data-status-pill]');
        return pill && pill.classList.contains('status-update-available');
      }).map(row => {
        const name = row.querySelector('strong')?.textContent || 'Unknown';
        const image = row.querySelector('.small')?.textContent || '';
        const installedTag = row.querySelector('[data-installed-tag]')?.textContent || 'n/d';
        const remoteTag = row.querySelector('[data-remote-tag]')?.textContent || 'n/d';
        return {
          id: row.dataset.containerId,
          name, image, installedTag, remoteTag, row
        };
      });
    }

    function openBatchModal() {
      const containers = getUpdatableContainers();
      if (containers.length === 0) {
        alert('Nessun container con aggiornamenti disponibili.');
        return;
      }
      batchList.innerHTML = '';
      containers.forEach(c => {
        const div = document.createElement('div');
        div.className = 'batch-item';
        div.innerHTML = `
          <label>
            <input type="checkbox" checked data-batch-id="${escapeHtml(c.id)}" data-batch-name="${escapeHtml(c.name)}">
            <div class="batch-item-info">
              <div class="batch-item-name">${escapeHtml(c.name)}</div>
              <div class="batch-item-version">
                ${escapeHtml(c.installedTag)} <span class="arrow">→</span> ${escapeHtml(c.remoteTag)}
              </div>
            </div>
          </label>`;
        batchList.appendChild(div);
      });
      batchSelectAllCb.checked = true;
      phaseSelect.style.display = '';
      phaseProgress.style.display = 'none';
      phaseSummary.style.display = 'none';
      batchModal.classList.add('visible');
      batchModal.setAttribute('aria-hidden', 'false');
    }

    function closeBatchModal() {
      batchModal.classList.remove('visible');
      batchModal.setAttribute('aria-hidden', 'true');
    }

    batchSelectAllCb?.addEventListener('change', () => {
      const cbs = batchList.querySelectorAll('input[type=checkbox]');
      cbs.forEach(cb => cb.checked = batchSelectAllCb.checked);
    });

    batchBtn?.addEventListener('click', openBatchModal);
    batchCancel?.addEventListener('click', closeBatchModal);
    batchCloseSelect?.addEventListener('click', closeBatchModal);
    batchDone?.addEventListener('click', () => { closeBatchModal(); location.reload(); });
    batchModal?.addEventListener('click', (e) => { if (e.target === batchModal) closeBatchModal(); });

    batchStart?.addEventListener('click', async () => {
      const selected = Array.from(batchList.querySelectorAll('input[type=checkbox]:checked')).map(cb => ({
        id: cb.dataset.batchId,
        name: cb.dataset.batchName
      }));
      if (selected.length === 0) return;

      // Fase 2: Progresso
      phaseSelect.style.display = 'none';
      phaseProgress.style.display = '';

      const progressList = document.getElementById('batch-progress-list');
      const progressBar = document.getElementById('batch-progress-bar');
      const progressText = document.getElementById('batch-progress-text');
      progressList.innerHTML = '';

      const items = selected.map(c => {
        const el = document.createElement('div');
        el.className = 'batch-prog-item';
        el.innerHTML = `
          <span class="batch-prog-icon">⬜</span>
          <span class="batch-prog-name">${escapeHtml(c.name)}</span>
          <span class="batch-prog-status">In attesa</span>`;
        progressList.appendChild(el);
        return { ...c, el };
      });

      let completed = 0, errors = 0;
      const total = items.length;

      for (const item of items) {
        // Segna come in corso
        item.el.className = 'batch-prog-item active';
        item.el.querySelector('.batch-prog-icon').textContent = '⏳';
        item.el.querySelector('.batch-prog-status').textContent = 'Aggiornamento...';
        item.el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        try {
          const res = await fetch(`/api/containers/${item.id}/full_update`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
          if (!res.ok) throw new Error('Update failed');
          const data = await res.json();
          if (data.success) {
            item.el.className = 'batch-prog-item done';
            item.el.querySelector('.batch-prog-icon').textContent = '✅';
            item.el.querySelector('.batch-prog-status').textContent = 'Completato';
            // Aggiorna la riga nella tabella sotto
            const row = document.querySelector(`[data-container-id="${item.id}"]`);
            if (row) {
              if (data.container_id) updateRowContainerId(row, item.id, data.container_id);
              refreshRow(row);
            }
            completed++;
          } else {
            throw new Error(data.error || 'Update fallito');
          }
        } catch (err) {
          item.el.className = 'batch-prog-item error';
          item.el.querySelector('.batch-prog-icon').textContent = '❌';
          item.el.querySelector('.batch-prog-status').textContent = err.message || 'Errore';
          errors++;
        }

        const done = completed + errors;
        progressBar.style.width = `${(done / total) * 100}%`;
        progressText.textContent = `${done} / ${total} completati`;
      }

      // Fase 3: Riepilogo
      phaseProgress.style.display = 'none';
      phaseSummary.style.display = '';

      const summaryStats = document.getElementById('batch-summary-stats');
      summaryStats.innerHTML = `
        <div class="batch-stat success">✅ ${completed} aggiornati</div>
        ${errors > 0 ? `<div class="batch-stat fail">❌ ${errors} errori</div>` : ''}`;

      const summaryList = document.getElementById('batch-summary-list');
      summaryList.innerHTML = progressList.innerHTML;
    });

    // Inline selection logic
    const tableCheckboxes = document.querySelectorAll('.container-select');
    const bulkBar = document.getElementById('bulk-bar');
    const bulkCount = document.getElementById('bulk-count');
    const bulkUpdateBtn = document.getElementById('bulk-update-btn');

    function updateBulkBar() {
      const selected = Array.from(document.querySelectorAll('.container-select:checked'));
      if (selected.length > 0) {
        if(bulkCount) bulkCount.textContent = selected.length;
        if(bulkBar) {
          bulkBar.classList.add('visible');
          bulkBar.setAttribute('aria-hidden', 'false');
        }
      } else {
        if(bulkBar) {
          bulkBar.classList.remove('visible');
          bulkBar.setAttribute('aria-hidden', 'true');
        }
      }

      document.querySelectorAll('.container-row').forEach(row => row.classList.remove('selected'));
      selected.forEach(cb => {
        const row = cb.closest('.container-row');
        if (row) row.classList.add('selected');
      });
    }

    tableCheckboxes.forEach(cb => cb.addEventListener('change', updateBulkBar));

    bulkUpdateBtn?.addEventListener('click', () => {
      const selected = Array.from(document.querySelectorAll('.container-select:checked')).map(cb => ({
        id: cb.value,
        name: cb.dataset.containerName
      }));
      if (selected.length === 0) return;

      batchModal.classList.add('visible');
      batchModal.setAttribute('aria-hidden', 'false');

      // Populate batchList temporarily so batchStart works
      batchList.innerHTML = '';
      selected.forEach(c => {
         const div = document.createElement('div');
         div.innerHTML = `<label><input type="checkbox" checked data-batch-id="${escapeHtml(c.id)}" data-batch-name="${escapeHtml(c.name)}"></label>`;
         batchList.appendChild(div);
      });

      // Trigger batch update progress phase automatically
      batchStart.click();
    });

</script>
